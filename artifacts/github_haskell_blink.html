<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>GitHub Haskell XY Blink</title>
<style>
:root {
  --bg: #0d1117;
  --grid: #213042;
  --ink: #d8f3dc;
  --prime: #80ed99;
  --mixed: #ffd166;
  --axis: #8ecae6;
}
body {
  margin: 0;
  min-height: 100vh;
  background:
    radial-gradient(circle at top, rgba(128, 237, 153, 0.15), transparent 40%),
    linear-gradient(180deg, #071018 0%, var(--bg) 100%);
  color: var(--ink);
  font-family: Consolas, "Courier New", monospace;
}
main {
  max-width: 1200px;
  margin: 0 auto;
  padding: 24px;
}
.plot {
  position: relative;
  height: 72vh;
  border: 1px solid var(--grid);
  background-image:
    linear-gradient(var(--grid) 1px, transparent 1px),
    linear-gradient(90deg, var(--grid) 1px, transparent 1px);
  background-size: 10% 10%;
  overflow: hidden;
}
.axis {
  position: absolute;
  color: var(--axis);
  font-size: 14px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}
.axis.x { bottom: 8px; right: 12px; }
.axis.y { top: 12px; left: 12px; }
.point {
  position: absolute;
  width: 14px;
  height: 14px;
  border-radius: 999px;
  transform: translate(-50%, 50%);
  animation: blink 1.1s steps(2, start) infinite;
  box-shadow: 0 0 18px currentColor;
}
.point span {
  position: absolute;
  top: -22px;
  left: 12px;
  white-space: nowrap;
  font-size: 11px;
  color: var(--ink);
}
.point.prime { color: var(--prime); background: var(--prime); }
.point.mixed { color: var(--mixed); background: var(--mixed); }
@keyframes blink {
  50% { opacity: 0.18; transform: translate(-50%, 50%) scale(0.7); }
}
</style>
</head>
<body>
<main>
<h1>GitHub Haskell XY Blink</h1>
<p>query: <code>language:Haskell stars:&gt;500</code></p>
<p>x = repo stars, y = file bytes, green = both prime, yellow = mixed.</p>
<div class="plot">
<div class="axis y">y bytes</div>
<div class="axis x">x stars</div>
